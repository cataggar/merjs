name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  id-token: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    name: Build & publish release

    steps:
      - uses: actions/checkout@v4

      - name: Install Zig via ghr
        uses: cataggar/ghr/actions/install@v0.6.4
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tools: |
            cataggar/zig@v0.16.0 RWSGOq2NVecA2UPNdBUZykf1CCb147pkmdtYxgb3Ti+JO/wCYvhbAb/U

      - name: Build check
        run: |
          zig build codegen
          zig build

      - name: Run tests
        run: zig build test

      - name: Cross-compile CLI
        run: |
          mkdir -p release
          zig build cli -Doptimize=ReleaseSmall -Dtarget=aarch64-macos
          cp zig-out/bin/mer release/mer-macos-aarch64
          zig build cli -Doptimize=ReleaseSmall -Dtarget=x86_64-macos
          cp zig-out/bin/mer release/mer-macos-x86_64
          zig build cli -Doptimize=ReleaseSmall -Dtarget=x86_64-linux
          cp zig-out/bin/mer release/mer-linux-x86_64
          zig build cli -Doptimize=ReleaseSmall -Dtarget=aarch64-linux
          cp zig-out/bin/mer release/mer-linux-aarch64

      - name: Create install.sh release asset
        run: |
          cp install.sh release/install.sh

      - name: Generate checksums
        working-directory: release
        run: sha256sum mer-* > checksums.txt

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign binaries with cosign (per-asset sigstore bundles)
        # Keyless signing via GitHub's OIDC identity — no secrets needed.
        # `ghr install` verifies the resulting `<asset>.sigstore.json`
        # bundle automatically, so `ghr install ${{ github.repository }}@${{ github.ref_name }}`
        # fails closed on any tampering and prints the signer identity.
        env:
          COSIGN_YES: 'true'
        working-directory: release
        run: |
          set -euo pipefail
          for asset in mer-*; do
            cosign sign-blob \
              --bundle "${asset}.sigstore.json" \
              --output-signature /dev/null \
              --output-certificate /dev/null \
              "${asset}"
          done
          ls -la ./*.sigstore.json

      - name: Write release notes
        run: |
          cat > release/notes.md <<'EOF'
          ## 🚀 merjs ${{ github.ref_name }}

          ### Quick Install
          
          **macOS/Linux:**
          ```bash
          curl -fsSL https://merjs.trilok.ai/install.sh | bash
          ```

          Or with wget:
          ```bash
          wget -qO- https://merjs.trilok.ai/install.sh | bash
          ```

          **Via [ghr](https://github.com/cataggar/ghr):**
          ```bash
          ghr install ${{ github.repository }}@${{ github.ref_name }}
          ```
          Each binary is signed with a per-asset sigstore bundle (keyless,
          via GitHub Actions OIDC); `ghr install` verifies it automatically.

          **Manual Install:**
          1. Download the matching `mer-*` binary below for your platform
          2. Rename it to `mer`
          3. Move it to a directory in your PATH (e.g., `/usr/local/bin/`)
          4. Make it executable: `chmod +x /usr/local/bin/mer`

          ### Quick Start
          
          ```bash
          mer init myapp    # Create new project
          cd myapp          # Enter project
          mer dev           # Start dev server with hot reload
          ```

          ### Available Binaries

          | Platform | Binary |
          |----------|--------|
          | macOS (Apple Silicon) | `mer-macos-aarch64` |
          | macOS (Intel) | `mer-macos-x86_64` |
          | Linux (x86_64) | `mer-linux-x86_64` |
          | Linux (ARM64) | `mer-linux-aarch64` |

          ### Verification

          Check the SHA256 checksums:
          ```bash
          sha256sum -c checksums.txt
          ```

          Or verify the sigstore bundle for a given binary:
          ```bash
          cosign verify-blob --bundle mer-linux-x86_64.sigstore.json mer-linux-x86_64
          ```
          EOF

      - name: Create release
        run: |
          gh release create "${{ github.ref_name }}" \
            release/mer-macos-aarch64 \
            release/mer-macos-x86_64 \
            release/mer-linux-x86_64 \
            release/mer-linux-aarch64 \
            release/*.sigstore.json \
            release/install.sh \
            release/checksums.txt \
            --notes-file release/notes.md \
            --title "${{ github.ref_name }}" \
            --latest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
